<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background rounded square -->
  <rect width="256" height="256" rx="40" fill="#1a2f5a"/>

  <!-- Subtle inner gradient overlay -->
  <rect width="256" height="256" rx="40" fill="url(#grad)" opacity="0.3"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a5a9c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1f3d;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 語 character -->
  <text
    x="128"
    y="195"
    font-family="'Noto Sans JP', 'Yu Gothic', 'Hiragino Kaku Gothic Pro', sans-serif"
    font-size="195"
    font-weight="bold"
    text-anchor="middle"
    fill="white"
  >語</text>
</svg>
